<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="saved.css">
  <title>Saved Words - Tap Search</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <h1>Saved Words</h1>
        <span class="count" id="count"></span>
      </div>
      <div class="search-row">
        <input type="text" id="search" placeholder="Search saved words..." autocomplete="off">
      </div>
      <div class="toolbar-row">
        <button id="export-btn" class="toolbar-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button id="import-btn" class="toolbar-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import
        </button>
        <input type="file" id="import-file" accept="application/json,.json" hidden>
        <span id="toolbar-status" class="toolbar-status"></span>
      </div>
    </header>

    <div id="list" class="word-list"></div>

    <div id="empty" class="empty-state" style="display:none">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
      <p class="empty-title">No saved words yet</p>
      <p class="empty-subtitle">Double-click any word on a webpage and click the bookmark icon to save it here.</p>
    </div>

    <div id="no-results" class="empty-state" style="display:none">
      <p class="empty-title">No matches</p>
      <p class="empty-subtitle">Try a different search term.</p>
    </div>
  </div>

  <script src="saved.js"></script>
</body>
</html>
